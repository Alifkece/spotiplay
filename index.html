<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpotiPlay — Spotify Web Player</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --bg: #000;
  --text: #fff;
  --muted: #aaa;
  --primary: #ff0000;
  --secondary: #AD4AE7;
  --green: #1DB954;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.1), transparent 30%),
    radial-gradient(circle at 80% 10%, rgba(255,255,255,.08), transparent 25%),
    radial-gradient(circle at 50% 90%, rgba(255,255,255,.05), transparent 30%),
    var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
}

.container { max-width: 900px; margin: auto; }

/* Profile */
.profile-wrapper {
  width: 120px; height: 120px; border-radius: 50%;
  margin: 0 auto 20px; padding: 5px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  box-shadow: 0 0 25px rgba(173,74,231,.5);
  animation: glow 4s infinite alternate;
}
.profile-wrapper video {
  width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
}
@keyframes glow {
  0% { box-shadow: 0 0 15px var(--primary); }
  100% { box-shadow: 0 0 30px var(--secondary); }
}

/* Header */
.header { text-align: center; margin-bottom: 30px; }
.title { font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 800; }
.title span { color: var(--green); }
.subtitle { color: var(--muted); font-size: 14px; margin-top: 5px; }

/* Section */
.section {
  background: rgba(255,255,255,.05);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 18px; padding: 24px;
  margin-bottom: 24px; position: relative;
}
.section::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: 18px 18px 0 0;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
}
.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px; margin-bottom: 18px;
  display: flex; align-items: center; gap: 10px;
}

/* Search */
.search-row { display: flex; gap: 10px; }
.search-row .input { flex: 1; }
.search-row .btn { white-space: nowrap; }

.input {
  width: 100%; padding: 11px 14px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 12px; color: #fff; font-size: 14px;
  transition: border .2s;
}
.input:focus { outline: none; border-color: var(--secondary); }
.input::placeholder { color: #555; }

.btn {
  padding: 12px 20px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border: none; border-radius: 12px;
  color: #fff; font-weight: bold; cursor: pointer;
  font-size: 14px; transition: opacity .2s;
  display: flex; align-items: center; gap: 8px;
}
.btn:hover { opacity: .85; }

/* Track list */
.track-list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.track-card {
  display: flex; align-items: center; gap: 14px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 14px; padding: 12px;
  transition: background .2s, border .2s;
  cursor: pointer;
}
.track-card:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.25); }
.track-card.active { border-color: var(--green); background: rgba(29,185,84,.08); }

.track-img {
  width: 54px; height: 54px; border-radius: 10px;
  object-fit: cover; flex-shrink: 0;
}
.track-info { flex: 1; overflow: hidden; }
.track-name {
  font-weight: 600; font-size: 14px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.track-artist { color: var(--muted); font-size: 13px; margin-top: 2px; }
.track-actions { display: flex; gap: 8px; flex-shrink: 0; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 8px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15);
  color: #fff; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}
.icon-btn.play-btn { background: var(--green); border-color: var(--green); }

/* Now Playing */
#nowPlaying { display: none; }
.now-playing-inner {
  display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
}
.now-img {
  width: 90px; height: 90px; border-radius: 14px;
  object-fit: cover; flex-shrink: 0;
  box-shadow: 0 0 20px rgba(29,185,84,.3);
}
.now-info { flex: 1; min-width: 180px; }
.now-title { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700; }
.now-artist { color: var(--muted); font-size: 13px; margin-top: 4px; }
.now-album { color: #555; font-size: 12px; margin-top: 2px; }
.now-tags { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.tag {
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}
.tag-green { background: rgba(29,185,84,.2); color: var(--green); border: 1px solid rgba(29,185,84,.3); }

/* Player controls */
.player-controls { margin-top: 18px; }
.progress-bar-wrap {
  width: 100%; height: 5px; background: rgba(255,255,255,.12);
  border-radius: 10px; cursor: pointer; position: relative; margin-bottom: 6px;
}
.progress-bar-fill {
  height: 100%; width: 0%; border-radius: 10px;
  background: linear-gradient(90deg, var(--green), #17a349);
}
.progress-times { display: flex; justify-content: space-between; font-size: 11px; color: #666; }

.controls-row {
  display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 14px;
}
.ctrl-btn {
  background: none; border: none; color: #aaa; cursor: pointer; font-size: 18px;
}
.ctrl-btn.main {
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--green); color: #fff; display: flex; align-items: center; justify-content: center;
}

.volume-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
.volume-slider { flex: 1; accent-color: var(--green); }

/* Download */
.dl-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.dl-btn {
  flex: 1; min-width: 140px; padding: 12px;
  border-radius: 12px; font-size: 14px; font-weight: 600;
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  text-decoration: none; text-align: center;
}
.dl-mp3 { background: linear-gradient(135deg, #1DB954, #17a349); color: #fff; }

/* Status */
.status {
  text-align: center; padding: 12px; border-radius: 10px;
  font-size: 13px; margin-top: 12px; display: none;
}
.status.loading { display: block; color: var(--secondary); }
.status.error { display: block; background: rgba(255,0,0,0.15); color: #ff6b6b; border: 1px solid rgba(255,0,0,0.25); text-align: left; }
.status.success { display: block; background: rgba(29,185,84,.1); color: var(--green); border: 1px solid rgba(29,185,84,.2); }

.empty-state { text-align: center; color: #555; padding: 30px; font-size: 14px; }
.empty-state i { font-size: 36px; margin-bottom: 10px; display: block; }
</style>
</head>

<body>
<div class="container">

<div class="profile-wrapper">
  <video src="https://raw.githubusercontent.com/Alifkece/media/main/uploads/1780631439477_download.mp4" autoplay loop muted playsinline></video>
</div>

<div class="header">
  <h1 class="title">Spoti<span>Play</span></h1>
  <p class="subtitle">Powered By Aliftzycrt🍓  |  Search · Play · Download</p>
</div>

<div class="section">
  <h2 class="section-title"><i class="fas fa-search" style="color:var(--secondary)"></i> Cari Musik</h2>
  <div class="search-row">
    <input type="text" id="searchQuery" class="input" placeholder="Cari lagu, artis, album..." onkeydown="if(event.key==='Enter')searchTracks()">
    <button class="btn" onclick="searchTracks()"><i class="fas fa-search"></i> Cari</button>
  </div>
  <div class="status" id="searchStatus"></div>
  <div class="track-list" id="trackList">
    <div class="empty-state">
      <i class="fab fa-spotify" style="color:#333"></i> Masukkan judul musik untuk memulai!
    </div>
  </div>
</div>

<div class="section" id="nowPlaying">
  <h2 class="section-title"><i class="fas fa-music" style="color:var(--green)"></i> Now Playing</h2>
  <div class="now-playing-inner">
    <img id="nowImg" class="now-img" src="" alt="cover">
    <div class="now-info">
      <div class="now-title" id="nowTitle">—</div>
      <div class="now-artist" id="nowArtist">—</div>
      <div class="now-album" id="nowAlbum">—</div>
      <div class="now-tags">
        <span class="tag tag-green" id="nowPopularity">🔥 Popularity: —</span>
      </div>
    </div>
  </div>

  <div class="player-controls">
    <div class="progress-bar-wrap" id="progressBarWrap" onclick="seekAudio(event)">
      <div class="progress-bar-fill" id="progressBarFill"></div>
    </div>
    <div class="progress-times">
      <span id="currentTime">0:00</span>
      <span id="totalDuration">0:00</span>
    </div>
    <div class="controls-row">
      <button class="ctrl-btn" onclick="rewindAudio()"><i class="fas fa-backward"></i></button>
      <button class="ctrl-btn main" id="mainPlayBtn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
      <button class="ctrl-btn" onclick="forwardAudio()"><i class="fas fa-forward"></i></button>
    </div>
    <div class="volume-row">
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1" oninput="changeVolume(this.value)">
    </div>
  </div>

  <div class="dl-row">
    <button class="dl-btn dl-mp3" onclick="downloadTrack()">
      <i class="fas fa-download"></i> Dapatkan Link Download MP3
    </button>
  </div>
  <div class="status" id="dlStatus"></div>
</div>

</div>

<script>
const PLAY_BASE_URL = "https://kyzznekoo.zone.id/api/play/spotify?url=";
const SEARCH_BASE_URL = "https://kyzznekoo.zone.id/api/search/spotify?q=";

const PROXIES = [
  "https://api.allorigins.win/raw?url=",
  "https://corsproxy.io/?url="
];

let currentTrack = null;
const audioPlayer = new Audio();
audioPlayer.crossOrigin = "anonymous";

async function fetchWithProxy(url) {
  let lastErr = null;
  for (let p of PROXIES) {
    try {
      const res = await fetch(p + encodeURIComponent(url));
      if (res.ok) return await res.json();
    } catch (e) { lastErr = e; }
  }
  // Fallback direct request jika proxy bermasalah
  const direct = await fetch(url);
  return await direct.json();
}

audioPlayer.addEventListener('timeupdate', () => {
  if (!audioPlayer.duration) return;
  document.getElementById('progressBarFill').style.width = (audioPlayer.currentTime / audioPlayer.duration) * 100 + '%';
  document.getElementById('currentTime').textContent = formatTime(audioPlayer.currentTime);
});
audioPlayer.addEventListener('loadedmetadata', () => {
  document.getElementById('totalDuration').textContent = formatTime(audioPlayer.duration);
});
audioPlayer.addEventListener('play', () => { document.getElementById('mainPlayBtn').innerHTML = '<i class="fas fa-pause"></i>'; });
audioPlayer.addEventListener('pause', () => { document.getElementById('mainPlayBtn').innerHTML = '<i class="fas fa-play"></i>'; });
audioPlayer.addEventListener('error', () => {
  showStatus('dlStatus', 'error', '⚠️ Browser memblokir streaming langsung akibat sistem mixed-content HTTPS GitHub. Jangan khawatir! Silakan ketuk tombol <b>"Dapatkan Link Download MP3"</b> di atas untuk mengunduh musiknya secara langsung.');
});

function togglePlay() {
  if (!audioPlayer.src || audioPlayer.src === window.location.href) return;
  if (audioPlayer.paused) audioPlayer.play().catch(()=>{});
  else audioPlayer.pause();
}
 Zar
function seekAudio(e) {
  if (!audioPlayer.duration) return;
  const rect = document.getElementById('progressBarWrap').getBoundingClientRect();
  audioPlayer.currentTime = ((e.clientX - rect.left) / rect.width) * audioPlayer.duration;
}
function changeVolume(v) { audioPlayer.volume = v; }
function rewindAudio() { audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - 10); }
function forwardAudio() { audioPlayer.currentTime = Math.min(audioPlayer.duration, audioPlayer.currentTime + 10); }
function formatTime(s) {
  if(isNaN(s)) return "0:00";
  const m = Math.floor(s/60); const sec = Math.floor(s%60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

async function searchTracks() {
  const q = document.getElementById('searchQuery').value.trim();
  if (!q) return;
  showStatus('searchStatus', 'loading', 'Mencari lagu...');
  try {
    const data = await fetchWithProxy(`${SEARCH_BASE_URL}${encodeURIComponent(q)}`);
    const items = data.songs || data.result || data.data || [];
    if (!items.length) { showStatus('searchStatus', 'error', 'Lagu tidak ditemukan.'); return; }
    
    showStatus('searchStatus', '', '');
    document.getElementById('searchStatus').style.display = 'none';
    const list = document.getElementById('trackList'); list.innerHTML = '';

    items.forEach((track, index) => {
      let img = track.thumbnail || track.image || track.cover || (track.album && track.album.cover) || 'https://placehold.co/150/222/fff?text=Music';
      if (img.startsWith('http://')) img = img.replace('http://', 'https://');
      
      const artist = track.artist || track.author || 'Unknown Artist';
      const title = track.title || track.name || 'Unknown Title';
      
      const card = document.createElement('div');
      card.className = 'track-card';
      card.dataset.id = index;
      card.innerHTML = `
        <img class="track-img" src="${img}" alt="cover">
        <div class="track-info">
          <div class="track-name">${title}</div>
          <div class="track-artist">${artist}</div>
        </div>
        <div class="track-actions"><button class="icon-btn play-btn"><i class="fas fa-play"></i></button></div>
      `;
      
      track.cImg = img; track.cArtist = artist; track.cTitle = title;
      track.cLink = track.url || track.link || '';
      card.onclick = () => loadTrack(track, index);
      list.appendChild(card);
    });
  } catch(e) { showStatus('searchStatus', 'error', 'Gagal memuat API Search.'); }
}

async function loadTrack(track, id) {
  currentTrack = track;
  document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
  const active = document.querySelector(`[data-id="${id}"]`);
  if (active) active.classList.add('active');

  document.getElementById('nowImg').src = track.cImg;
  document.getElementById('nowTitle').textContent = track.cTitle;
  document.getElementById('nowArtist').textContent = track.cArtist;
  document.getElementById('nowAlbum').textContent = track.album?.name || 'Single Track';
  document.getElementById('nowPopularity').textContent = '🔥 Popularity: ' + (track.popularity || 'N/A') + '/100';
  document.getElementById('nowPlaying').style.display = 'block';
  
  audioPlayer.pause(); audioPlayer.src = '';
  showStatus('dlStatus', 'loading', 'Menghubungkan ke server stream data...');

  try {
    const resData = await fetchWithProxy(`${PLAY_BASE_URL}${encodeURIComponent(track.cLink)}`);
    let audioUrl = resData.url || (resData.songs && resData.songs[0]?.url) || (resData.result && resData.result.url);
    
    if (audioUrl) {
      if (audioUrl.startsWith('http://')) audioUrl = audioUrl.replace('http://', 'https://');
      currentTrack.audioUrl = audioUrl;
      audioPlayer.src = audioUrl;
      audioPlayer.load();
      showStatus('dlStatus', 'success', '✅ Siap diputar! Klik tombol hijau di atas.');
      audioPlayer.play().catch(()=>{});
    } else {
      showStatus('dlStatus', 'error', '⚠️ Server gagal membuat streaming langsung. Silakan langsung klik tombol "Dapatkan Link Download MP3" di bawah.');
    }
  } catch(e) {
    showStatus('dlStatus', 'error', '❌ Gagal memuat data stream dari server.');
  }
}

async function downloadTrack() {
  if (!currentTrack) return;
  showStatus('dlStatus', 'loading', 'Menyiapkan link unduhan...');
  try {
    let url = currentTrack.audioUrl;
    if(!url) {
      const resData = await fetchWithProxy(`${PLAY_BASE_URL}${encodeURIComponent(currentTrack.cLink)}`);
      url = resData.url || (resData.songs && resData.songs[0]?.url) || (resData.result && resData.result.url);
    }
    if(url) {
      showStatus('dlStatus', 'success', `🎉 Link Siap! <a href="${url}" target="_blank" style="color:#1DB954; font-weight:bold; text-decoration:underline;">Klik di Sini untuk Download MP3</a>`);
      window.open(url, '_blank');
    } else { showStatus('dlStatus', 'error', 'Gagal mendapatkan link unduhan.'); }
  } catch(e) { showStatus('dlStatus', 'error', 'Terjadi kesalahan jaringan.'); }
}

function showStatus(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'status ' + type; el.innerHTML = msg;
  el.style.display = type ? 'block' : 'none';
}
</script>
</body>
</html>
